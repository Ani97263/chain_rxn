<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Chain Reactor</title>
</head>
<body>
    <h1>Chain Reactor</h1>
    <div id="timer-display">Time: 3:00</div>
    <div id="game-board"></div>
    <div id="result-overlay" class="hidden">
        <div id="result-box">
            <h2 id="result-message">Game Over!</h2>
            <div class="button-group">
                <button class="play-btn" onclick="location.reload()">Play Again! ✨</button>
                <button class="stop-btn" onclick="stopGame()">Stop 🛑</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
